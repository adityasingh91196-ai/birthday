<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Aarushi 💖🎂</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#ff758c,#ff7eb3);
  text-align:center;
  color:white;
  overflow:hidden;
}

h1{ margin-top:20px; }

#cat{
  font-size:100px;
  transition:0.3s;
}

.question{
  font-size:22px;
  margin:20px;
  padding:10px;
}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:25px;
  font-size:18px;
  cursor:pointer;
}

#yes{
  background:white;
  color:#ff4f81;
  font-weight:bold;
}

#no{
  background:black;
  color:white;
  position:absolute;
}

.emoji{
  position:absolute;
  font-size:25px;
  animation:fall 3s linear infinite;
}

@keyframes fall{
  0%{top:-50px;}
  100%{top:100vh;}
}
</style>
</head>

<body>

<h1>Happy Birthday Aarushi 🎂💖</h1>
<div id="cat">😾</div>
<div class="question" id="question">Aarushi, do you love me? 💕</div>

<button id="yes">YES 😍</button>
<button id="no">NO 😏</button>

<!-- Background Romantic Song -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- Sound Effects -->
<audio id="yesSound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-bonus-earned-in-video-game-2058.mp3">
</audio>

<audio id="angrySound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-angry-cartoon-kitty-meow-94.mp3">
</audio>

<audio id="celebrateSound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-party-horn-1584.mp3">
</audio>

<script>

let musicStarted = false;
let music = document.getElementById("bgMusic");
let yesSound = document.getElementById("yesSound");
let angrySound = document.getElementById("angrySound");
let celebrateSound = document.getElementById("celebrateSound");

let questions = [
"Aarushi, do you love me? 💕",
"Am I your favourite person? 😘",
"Will you stay with me forever? 💍",
"Do I make you smile everyday? 😊",
"Am I your cute hero? 😎",
"Do you miss me when I'm not around? 🥺",
"Will you celebrate every birthday with me? 🎂",
"Am I your happiness? ☀️",
"Do you think about me daily? 💭",
"Am I your safe place? ❤️",
"Will you hold my hand always? 🤝",
"Am I lucky to have you? 🍀",
"Do you like my efforts for you? 💖",
"Will you travel the world with me? 🌍",
"Am I your late night partner? 🌙",
"Will you never leave me? 🥹",
"Am I your forever person? 💞",
"Do you love my silly talks? 😜",
"Am I special to you? ✨",
"Aarushi, will you always be mine? 💘"
];

let index = 0;
let cat = document.getElementById("cat");
let question = document.getElementById("question");
let noBtn = document.getElementById("no");

noBtn.style.top = "60%";
noBtn.style.left = "50%";

noBtn.addEventListener("mouseover", function(){
  let x = Math.random()*80;
  let y = Math.random()*80;
  noBtn.style.left = x+"%";
  noBtn.style.top = y+"%";
  cat.innerHTML = "😾";
  angrySound.play();
});

document.getElementById("yes").addEventListener("click", function(){

  if(!musicStarted){
    music.play();
    musicStarted = true;
  }

  yesSound.play();
  createCrackers();
  createEmojis();

  index++;

  if(index < questions.length){
    question.innerHTML = questions[index];
    cat.innerHTML = "😸";
  }else{
    document.body.innerHTML = `
    <h1 style="margin-top:100px;">I LOVE YOU SO MUCH AARUSHI 😭💖</h1>
    <h2>You are my forever and always 💍😘</h2>
    <h1>🎆🎆🎆 HAPPY BIRTHDAY 🎂🎉🎆🎆🎆</h1>
    `;
    celebrateSound.play();
    createCrackers();
    createEmojis();
  }

});

function createEmojis(){
  for(let i=0;i<25;i++){
    let emoji = document.createElement("div");
    emoji.className="emoji";
    emoji.innerHTML="💖";
    emoji.style.left=Math.random()*100+"%";
    emoji.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(emoji);
  }
}

function createCrackers(){
  for(let i=0;i<20;i++){
    let cracker = document.createElement("div");
    cracker.className="emoji";
    cracker.innerHTML="🎆";
    cracker.style.left=Math.random()*100+"%";
    cracker.style.animationDuration=(1+Math.random()*2)+"s";
    document.body.appendChild(cracker);
  }
}

</script>

</body>
</html>
