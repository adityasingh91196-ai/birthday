<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Aarushi 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  color:white;
  font-family: 'Segoe UI', sans-serif;
  overflow:hidden;
  transition:1s;
}

.card{
  background:#fff8dc;
  color:#333;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  position:relative;
}

#cat{
  font-size:60px;
}

.bubble{
  font-size:12px;
  margin-bottom:10px;
  color:#555;
}

button{
  padding:8px 20px;
  border:none;
  border-radius:20px;
  margin:5px;
  font-size:14px;
  cursor:pointer;
}

#yes{
  background:#ff4f81;
  color:white;
}

#no{
  background:black;
  color:white;
}

#countdown{
  font-size:40px;
}
</style>
</head>

<body>

<div id="countdown">3</div>

<script>

let count=3;

let countdown=setInterval(()=>{
count--;
if(count>0){
document.getElementById("countdown").innerHTML=count;
}else{
clearInterval(countdown);
startCard();
}
},1000);

function startCard(){
document.body.innerHTML=`
<div class="card">
<div id="cat">😾</div>
<div class="bubble" id="bubble">Don't press NO 😾</div>
<div id="question">My Love Moti 💖<br>Do you love me?</div>
<button id="yes">Yes 😍</button>
<button id="no">No 🙈</button>
</div>
`;

setup();
}

function setup(){

let questions=[
"Am I your favourite person? 😏",
"If I steal your fries 🍟 will you still love me?",
"When you're angry 😾 do you miss me secretly?",
"Am I your safe place? 🖤",
"Do you smile seeing my message? 📱💞",
"Will you stay with Aarushi forever? 💍"
];

let index=0;

let cat=document.getElementById("cat");
let bubble=document.getElementById("bubble");
let question=document.getElementById("question");
let noBtn=document.getElementById("no");

document.getElementById("yes").onclick=function(){

cat.innerHTML="😽";
bubble.innerHTML="Good girl 😽";

if(index<questions.length){
question.innerHTML=questions[index];
index++;
document.body.style.background="#"+Math.floor(Math.random()*16777215).toString(16);
}else{
proposal();
}
};

noBtn.onclick=function(){
cat.innerHTML="😾";
bubble.innerHTML="Think again Moti 😼";
noBtn.style.transform=`translate(${Math.random()*200-100}px,${Math.random()*200-100}px)`;
};

}

function proposal(){
document.body.innerHTML=`
<div style="text-align:center;">
<h2>Will you stay with Aarushi forever? 💍</h2>
<button onclick="loveLetter()">Yes 💖</button>
</div>
`;
}

function loveLetter(){
document.body.innerHTML=`
<div id="letter" style="width:90%;max-width:500px;margin:auto;font-size:18px;white-space:pre-line;"></div>
`;

let text=`Aarushi... 💖

Shayad main perfect nahi hoon,
Par tum mere liye perfect ho.

Tum meri smile ho,
Mera sukoon ho,
Meri har din ki happiness ho.

Jab tum hasti ho na,
Sach me duniya thodi si aur achi lagne lagti hai.

Main promise karta hoon,
Har situation me tumhare saath khada rahunga.

You are not just my love,
You are my forever.

I Love You So Much Aarushi 💞`;

let i=0;
let speed=40;

function typeWriter(){
if(i<text.length){
document.getElementById("letter").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,speed);
}else{
nightSky();
}
}
typeWriter();
}

function nightSky(){
setTimeout(()=>{
document.body.innerHTML=`
<div style="text-align:center;">
<h1>🌙✨</h1>
<h2>You Are My Calm In Every Chaos</h2>
<p style="font-size:14px;">Forever Yours 💖</p>
</div>
`;
document.body.style.background="black";
},4000);
}

</script>

</body>
</html>
